services:
  postgres:
    # TODO switch back to official postgis image when arm64 is supported
    image: ghcr.io/baosystems/postgis:18-3.6@sha256:7debfed285fc93289e64d807997bab026d2f0daf761f2b15aa6e48240b64339c
    ports:
      - published: 5432
        target: 5432
    environment:
      POSTGRES_DB: dossier-root
      POSTGRES_USER: rootuser
      POSTGRES_PASSWORD: rootpass
