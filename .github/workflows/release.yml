name: Release
permissions:
  contents: read
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    name: Release
    runs-on: ubuntu-slim
    permissions:
      contents: write # changesets/action pushes the release PR branch; Publish step runs `git push --tags`
      id-token: write # required by npm for publishing with provenance
      pull-requests: write # changesets/action opens/updates the "Version Packages" release PR
    steps:
      - name: Checkout Repo
        # zizmor: ignore[artipacked] changesets/action pushes the release PR branch, and the Publish step does git push --tags
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create .npmrc
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          echo "provenance=true" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
      - name: Publish
        if: steps.changesets.outputs.hasChangesets == 'false' && contains(github.event.head_commit.message, 'Version Packages')
        run: |
          pnpm run changeset:build-and-publish
          git push origin --tags
        env:
          TURBO_TEAM: ${{ secrets.DOSSIERHQ_TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.DOSSIERHQ_TURBO_TOKEN }}
