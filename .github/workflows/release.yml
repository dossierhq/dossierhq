name: Release
permissions:
  contents: read
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    name: Release
    runs-on: ubuntu-slim
    permissions:
      contents: write # changesets/action pushes the release PR branch; Publish step runs `git push --tags`
      id-token: write # required by npm for publishing with provenance
      pull-requests: write # changesets/action opens/updates the "Version Packages" release PR
    steps:
      - name: Checkout Repo
        # zizmor: ignore[artipacked] changesets/action pushes the release PR branch, and the Publish step does git push --tags
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create .npmrc
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          echo "provenance=true" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
      - name: Publish
        if: steps.changesets.outputs.hasChangesets == 'false' && contains(github.event.head_commit.message, 'Version Packages')
        run: |
          pnpm run changeset:build-and-publish
          git push origin --tags
        env:
          TURBO_TEAM: ${{ secrets.DOSSIERHQ_TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.DOSSIERHQ_TURBO_TOKEN }}
